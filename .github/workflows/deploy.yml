name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write              # 👈 REQUIRED to create GitHub deployment
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              task: "deploy",
              auto_merge: false,
              environment: "production",
              description: "Deploying to Cloudflare Pages",
              required_contexts: [],
            });
            return deployment.id;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=mwakidenis-com --branch=main

      - name: Update GitHub Deployment Status (Success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.deployment.outputs.result }};
            const deploymentUrl = "https://mwakidenis-com.pages.dev/";  
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: "success",
              environment_url: deploymentUrl,
              log_url: deploymentUrl,
              description: "Deployed to Cloudflare Pages",
            });
